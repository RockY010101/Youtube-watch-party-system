name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── Frontend: Stage 1 — Build Check ───────────────────────────────────────
  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

  # ── Frontend: Stage 2 — Deploy to Vercel ──────────────────────────────────
  frontend-deploy:
    name: Deploy — Vercel
    runs-on: ubuntu-latest
    needs: frontend-build  # only runs if Build Check passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm install
        working-directory: client

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ── Backend: Stage 1 — Test & Build ───────────────────────────────────────
  backend-build:
    name: Backend — Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: server

      - name: Verify server starts
        run: node --check src/index.js
        working-directory: server

  # ── Backend: Stage 2 — Deploy to Render ───────────────────────────────────
  backend-deploy:
    name: Deploy — Render
    runs-on: ubuntu-latest
    needs: backend-build  # only runs if Test & Build passes
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}